<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="ScanTransport"/>
<meta name="theme-color" content="#0f172a"/>
<link rel="manifest" href="manifest.json"/>
<title>ScanTransport</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0f172a;
  --surface: #1e293b;
  --surface2: #334155;
  --border: rgba(148,163,184,0.15);
  --accent: #38bdf8;
  --accent2: #0ea5e9;
  --text: #f1f5f9;
  --muted: #94a3b8;
  --green: #4ade80;
  --amber: #fbbf24;
  --red: #f87171;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); overflow: hidden; }

/* SCREENS */
.screen { display: none; height: 100vh; flex-direction: column; overflow: hidden; }
.screen.active { display: flex; }

/* LOGIN */
#s-login {
  background: var(--bg);
  align-items: center;
  justify-content: center;
  padding: 2rem;
}
.login-logo {
  font-family: var(--mono);
  font-size: 13px;
  letter-spacing: 0.2em;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 3rem;
  text-align: center;
}
.login-logo span { display: block; font-size: 28px; letter-spacing: 0; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.login-card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: 16px;
  padding: 1.5rem;
  width: 100%;
  max-width: 360px;
}
.field { margin-bottom: 1rem; }
.field label { display: block; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
.field select, .field input {
  width: 100%;
  background: var(--bg);
  border: 0.5px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: var(--sans);
  font-size: 15px;
  padding: 12px 14px;
  outline: none;
  appearance: none;
  -webkit-appearance: none;
}
.field select:focus, .field input:focus { border-color: var(--accent); }
.btn-login {
  width: 100%;
  background: var(--accent2);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-family: var(--sans);
  font-size: 15px;
  font-weight: 500;
  padding: 14px;
  cursor: pointer;
  margin-top: 4px;
  letter-spacing: 0.02em;
}
.btn-login:active { opacity: 0.85; transform: scale(0.98); }
.login-error { color: var(--red); font-size: 13px; text-align: center; margin-top: 10px; display: none; }

/* MAIN */
#s-main { background: var(--bg); }
.topbar {
  background: var(--surface);
  border-bottom: 0.5px solid var(--border);
  padding: 12px 1rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}
.topbar-title { font-family: var(--mono); font-size: 13px; color: var(--accent); letter-spacing: 0.1em; }
.topbar-user { font-size: 13px; color: var(--muted); }
.btn-logout { background: none; border: none; color: var(--muted); font-size: 12px; cursor: pointer; padding: 4px 8px; border-radius: 6px; }
.btn-logout:active { background: var(--surface2); }

.tabs {
  display: flex;
  background: var(--surface);
  border-bottom: 0.5px solid var(--border);
  flex-shrink: 0;
}
.tab {
  flex: 1;
  padding: 11px 4px;
  text-align: center;
  font-size: 12px;
  color: var(--muted);
  background: none;
  border: none;
  cursor: pointer;
  letter-spacing: 0.05em;
  border-bottom: 2px solid transparent;
  font-family: var(--sans);
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.tab-content { display: none; flex: 1; overflow-y: auto; padding: 1rem; }
.tab-content.active { display: block; }

/* SCANNER TAB */
.cam-box {
  position: relative;
  background: #000;
  border-radius: 14px;
  overflow: hidden;
  aspect-ratio: 4/3;
  margin-bottom: 1rem;
}
#video { width: 100%; height: 100%; object-fit: cover; display: block; }
.cam-overlay {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
}
.cam-frame {
  width: 65%; aspect-ratio: 3/1;
  border: 2px solid var(--accent);
  border-radius: 8px;
  position: relative;
  box-shadow: 0 0 0 1000px rgba(0,0,0,0.45);
}
.scan-beam {
  position: absolute; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  animation: beam 1.6s ease-in-out infinite;
}
@keyframes beam { 0%,100% { top: 0; } 50% { top: calc(100% - 2px); } }
.flash-overlay { position: absolute; inset: 0; background: white; opacity: 0; pointer-events: none; transition: opacity 0.08s; border-radius: 14px; }
.cam-placeholder {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: var(--muted); font-size: 13px; gap: 8px;
}
.cam-icon { font-size: 36px; }

.status-row {
  display: flex; gap: 8px; margin-bottom: 1rem;
}
.status-btn {
  flex: 1; padding: 10px 4px; border-radius: 10px; border: 1.5px solid var(--border);
  background: transparent; color: var(--muted); font-family: var(--sans); font-size: 12px;
  cursor: pointer; font-weight: 500; letter-spacing: 0.03em;
}
.status-btn.active-exp { border-color: var(--accent); color: var(--accent); background: rgba(56,189,248,0.08); }
.status-btn.active-transit { border-color: var(--amber); color: var(--amber); background: rgba(251,191,36,0.08); }
.status-btn.active-livre { border-color: var(--green); color: var(--green); background: rgba(74,222,128,0.08); }

.manual-row { display: flex; gap: 8px; margin-bottom: 1rem; }
.manual-row input {
  flex: 1; background: var(--surface); border: 0.5px solid var(--border); border-radius: 10px;
  color: var(--text); font-family: var(--mono); font-size: 14px; padding: 12px; outline: none;
}
.manual-row input:focus { border-color: var(--accent); }
.btn-validate {
  background: var(--accent2); color: #fff; border: none; border-radius: 10px;
  font-family: var(--sans); font-size: 14px; font-weight: 500; padding: 12px 18px; cursor: pointer;
}
.btn-validate:active { opacity: 0.85; }

.counter-box {
  background: var(--surface); border: 0.5px solid var(--border); border-radius: 14px;
  padding: 1rem; margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between;
}
.counter-num { font-family: var(--mono); font-size: 36px; font-weight: 500; color: var(--accent); }
.counter-label { font-size: 12px; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; }

.last-scan {
  background: var(--surface); border-radius: 10px; padding: 12px 14px;
  border-left: 3px solid var(--accent); margin-bottom: 1rem; display: none;
}
.last-scan-code { font-family: var(--mono); font-size: 15px; font-weight: 500; }
.last-scan-meta { font-size: 12px; color: var(--muted); margin-top: 3px; }

.btn-cam {
  width: 100%; background: var(--surface); border: 0.5px solid var(--border); border-radius: 10px;
  color: var(--text); font-family: var(--sans); font-size: 14px; padding: 12px; cursor: pointer; margin-bottom: 8px;
}
.btn-cam:active { background: var(--surface2); }
.sync-indicator { font-size: 12px; color: var(--muted); text-align: center; margin-top: 8px; }
.sync-ok { color: var(--green); }
.sync-err { color: var(--red); }

/* HISTORY TAB */
.scan-item {
  background: var(--surface); border-radius: 10px; padding: 12px 14px; margin-bottom: 8px;
  display: flex; justify-content: space-between; align-items: center;
}
.scan-item-code { font-family: var(--mono); font-size: 14px; font-weight: 500; }
.scan-item-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }
.badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; white-space: nowrap; }
.b-exp { background: rgba(56,189,248,0.15); color: var(--accent); }
.b-transit { background: rgba(251,191,36,0.15); color: var(--amber); }
.b-livre { background: rgba(74,222,128,0.15); color: var(--green); }
.empty { text-align: center; color: var(--muted); font-size: 14px; padding: 3rem 0; }

/* REPORT TAB */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
.stat-card {
  background: var(--surface); border-radius: 12px; padding: 14px;
  border: 0.5px solid var(--border);
}
.stat-val { font-family: var(--mono); font-size: 28px; font-weight: 500; }
.stat-lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 4px; }
.v-total { color: var(--text); }
.v-exp { color: var(--accent); }
.v-transit { color: var(--amber); }
.v-livre { color: var(--green); }

.by-user { margin-bottom: 1rem; }
.by-user-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 8px; }
.user-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 0.5px solid var(--border); font-size: 14px; }
.user-row:last-child { border-bottom: none; }
.user-count { font-family: var(--mono); color: var(--accent); }

.btn-export {
  width: 100%; background: var(--green); color: #0f172a; border: none; border-radius: 10px;
  font-family: var(--sans); font-size: 15px; font-weight: 600; padding: 14px; cursor: pointer; margin-bottom: 8px;
}
.btn-export:active { opacity: 0.85; }
.btn-sync {
  width: 100%; background: var(--surface); border: 0.5px solid var(--border); border-radius: 10px;
  color: var(--text); font-family: var(--sans); font-size: 14px; padding: 12px; cursor: pointer;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="s-login" class="screen active">
  <div class="login-logo">
    <span>ScanTransport</span>
    Suivi de colis
  </div>
  <div class="login-card">
    <div class="field">
      <label>Employé</label>
      <select id="login-user">
        <option value="">Sélectionner...</option>
      </select>
    </div>
    <div class="field">
      <label>Code PIN (4 chiffres)</label>
      <input type="password" id="login-pin" maxlength="4" inputmode="numeric" pattern="[0-9]*" placeholder="••••"/>
    </div>
    <button class="btn-login" onclick="doLogin()">Connexion</button>
    <div class="login-error" id="login-err">Identifiants incorrects</div>
  </div>
</div>

<!-- MAIN -->
<div id="s-main" class="screen">
  <div class="topbar">
    <span class="topbar-title">SCAN//TRANSPORT</span>
    <div style="display:flex;align-items:center;gap:8px;">
      <span class="topbar-user" id="topbar-name"></span>
      <button class="btn-logout" onclick="doLogout()">✕</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('scan',this)">Scanner</button>
    <button class="tab" onclick="switchTab('history',this)">Historique</button>
    <button class="tab" onclick="switchTab('report',this)">Rapport</button>
  </div>

  <!-- SCAN -->
  <div id="tab-scan" class="tab-content active">
    <div class="cam-box" id="cam-box">
      <video id="video" autoplay playsinline muted></video>
      <div class="cam-overlay">
        <div class="cam-frame"><div class="scan-beam"></div></div>
      </div>
      <div class="flash-overlay" id="flash"></div>
      <div class="cam-placeholder" id="cam-ph">
        <div class="cam-icon">⬛</div>
        <div>Caméra non activée</div>
      </div>
    </div>

    <div class="status-row">
      <button class="status-btn active-exp" id="sb-exp" onclick="setStatus('Expédié')">Expédié</button>
      <button class="status-btn" id="sb-transit" onclick="setStatus('En transit')">En transit</button>
      <button class="status-btn" id="sb-livre" onclick="setStatus('Livré')">Livré</button>
    </div>

    <div class="manual-row">
      <input type="text" id="manual" placeholder="Saisie manuelle ou lecteur USB..." inputmode="text"/>
      <button class="btn-validate" onclick="manualScan()">OK</button>
    </div>

    <div class="counter-box">
      <div>
        <div class="counter-num" id="sess-count">0</div>
        <div class="counter-label">Scans session</div>
      </div>
      <div style="text-align:right;">
        <div style="font-family:var(--mono);font-size:22px;color:var(--muted);" id="total-count">0</div>
        <div class="counter-label">Total aujourd'hui</div>
      </div>
    </div>

    <div class="last-scan" id="last-scan">
      <div class="last-scan-code" id="ls-code"></div>
      <div class="last-scan-meta" id="ls-meta"></div>
    </div>

    <button class="btn-cam" onclick="startCamera()">📷 Activer la caméra</button>
    <div class="sync-indicator" id="sync-msg"></div>
  </div>

  <!-- HISTORY -->
  <div id="tab-history" class="tab-content">
    <div id="history-list"></div>
  </div>

  <!-- REPORT -->
  <div id="tab-report" class="tab-content">
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-val v-total" id="r-total">0</div><div class="stat-lbl">Total</div></div>
      <div class="stat-card"><div class="stat-val v-livre" id="r-livre">0</div><div class="stat-lbl">Livrés</div></div>
      <div class="stat-card"><div class="stat-val v-exp" id="r-exp">0</div><div class="stat-lbl">Expédiés</div></div>
      <div class="stat-card"><div class="stat-val v-transit" id="r-transit">0</div><div class="stat-lbl">En transit</div></div>
    </div>
    <div class="by-user">
      <div class="by-user-title">Par employé</div>
      <div id="r-byuser"></div>
    </div>
    <button class="btn-export" onclick="exportCSV()">⬇ Exporter Excel (.csv)</button>
    <button class="btn-sync" onclick="forceSyncAll()">↑ Synchroniser tout avec Sheets</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<script>
// ============================================================
// CONFIG — À MODIFIER
// ============================================================
const GOOGLE_SCRIPT_URL = "VOTRE_URL_APPS_SCRIPT_ICI";

const USERS = {
  "Jean Martin":      "1234",
  "Sophie Durand":    "2222",
  "Marc Leroy":       "3333",
  "Isabelle Petit":   "4444",
  "Thomas Bernard":   "5555",
  "Claire Moreau":    "6666",
  "Nicolas Lambert":  "7777",
  "Lucie Simon":      "8888",
  "Antoine Dubois":   "9999",
  "Emma Rousseau":    "0000"
};
// ============================================================

let currentUser = "";
let scans = JSON.parse(localStorage.getItem('scans') || '[]');
let sessionCount = 0;
let currentStatus = "Expédié";
let cameraActive = false;
let lastCode = "";
let lastCodeTime = 0;

// Peupler le select login
const sel = document.getElementById('login-user');
Object.keys(USERS).forEach(u => {
  const o = document.createElement('option');
  o.value = u; o.textContent = u; sel.appendChild(o);
});

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function doLogin() {
  const user = document.getElementById('login-user').value;
  const pin = document.getElementById('login-pin').value;
  if (USERS[user] && USERS[user] === pin) {
    currentUser = user;
    sessionCount = 0;
    document.getElementById('topbar-name').textContent = user.split(' ')[0];
    document.getElementById('login-err').style.display = 'none';
    document.getElementById('login-pin').value = '';
    updateCounters();
    show('s-main');
    switchTab('scan', document.querySelector('.tab'));
  } else {
    document.getElementById('login-err').style.display = 'block';
  }
}

function doLogout() {
  stopCamera();
  currentUser = "";
  sessionCount = 0;
  show('s-login');
}

document.getElementById('login-pin').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

function switchTab(name, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
  if (name === 'history') renderHistory();
  if (name === 'report') renderReport();
}

function setStatus(s) {
  currentStatus = s;
  document.getElementById('sb-exp').className = 'status-btn';
  document.getElementById('sb-transit').className = 'status-btn';
  document.getElementById('sb-livre').className = 'status-btn';
  if (s === 'Expédié') document.getElementById('sb-exp').className = 'status-btn active-exp';
  if (s === 'En transit') document.getElementById('sb-transit').className = 'status-btn active-transit';
  if (s === 'Livré') document.getElementById('sb-livre').className = 'status-btn active-livre';
}

function addScan(code) {
  const now = new Date();
  const scan = {
    code,
    status: currentStatus,
    user: currentUser,
    date: now.toLocaleDateString('fr-FR'),
    time: now.toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit',second:'2-digit'}),
    ts: now.toISOString(),
    synced: false
  };
  scans.push(scan);
  localStorage.setItem('scans', JSON.stringify(scans));
  sessionCount++;
  updateCounters();
  updateLastScan(scan);
  flash();
  sendToSheets(scan);
}

function updateCounters() {
  document.getElementById('sess-count').textContent = sessionCount;
  const today = new Date().toLocaleDateString('fr-FR');
  document.getElementById('total-count').textContent = scans.filter(s => s.date === today).length;
}

function updateLastScan(scan) {
  const box = document.getElementById('last-scan');
  box.style.display = 'block';
  document.getElementById('ls-code').textContent = scan.code;
  document.getElementById('ls-meta').textContent = scan.status + ' — ' + scan.time;
  box.style.borderLeftColor = scan.status === 'Expédié' ? 'var(--accent)' : scan.status === 'En transit' ? 'var(--amber)' : 'var(--green)';
}

function flash() {
  const f = document.getElementById('flash');
  f.style.opacity = '0.6';
  setTimeout(() => f.style.opacity = '0', 120);
}

function manualScan() {
  const inp = document.getElementById('manual');
  const code = inp.value.trim();
  if (!code) return;
  addScan(code);
  inp.value = '';
  inp.focus();
}
document.getElementById('manual').addEventListener('keydown', e => { if(e.key==='Enter') manualScan(); });

function startCamera() {
  if (cameraActive || typeof Quagga === 'undefined') return;
  document.getElementById('cam-ph').style.display = 'none';
  Quagga.init({
    inputStream: {
      type: 'LiveStream',
      target: document.getElementById('video'),
      constraints: { facingMode: 'environment', width: 640, height: 480 }
    },
    decoder: { readers: ['code_128_reader'] },
    locate: true
  }, err => {
    if (err) { document.getElementById('cam-ph').style.display = 'flex'; return; }
    cameraActive = true;
    Quagga.start();
  });
  Quagga.onDetected(result => {
    const code = result.codeResult.code;
    const now = Date.now();
    if (code === lastCode && now - lastCodeTime < 2000) return;
    lastCode = code; lastCodeTime = now;
    addScan(code);
  });
}

function stopCamera() {
  if (cameraActive && typeof Quagga !== 'undefined') { Quagga.stop(); cameraActive = false; }
}

async function sendToSheets(scan) {
  if (!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL === "VOTRE_URL_APPS_SCRIPT_ICI") return;
  setSyncMsg('Envoi...', '');
  try {
    await fetch(GOOGLE_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(scan)
    });
    scan.synced = true;
    localStorage.setItem('scans', JSON.stringify(scans));
    setSyncMsg('✓ Synchronisé', 'sync-ok');
  } catch(e) {
    setSyncMsg('⚠ Hors ligne — sauvegardé localement', 'sync-err');
  }
}

async function forceSyncAll() {
  const unsynced = scans.filter(s => !s.synced);
  if (!unsynced.length) { setSyncMsg('Tout est déjà synchronisé', 'sync-ok'); return; }
  setSyncMsg('Synchronisation de ' + unsynced.length + ' scan(s)...', '');
  for (const scan of unsynced) { await sendToSheets(scan); }
  setSyncMsg('✓ ' + unsynced.length + ' scan(s) synchronisé(s)', 'sync-ok');
}

function setSyncMsg(msg, cls) {
  const el = document.getElementById('sync-msg');
  el.textContent = msg;
  el.className = 'sync-indicator ' + cls;
}

function renderHistory() {
  const el = document.getElementById('history-list');
  if (!scans.length) { el.innerHTML = '<div class="empty">Aucun scan enregistré.</div>'; return; }
  el.innerHTML = [...scans].reverse().map(s => {
    const bc = s.status === 'Expédié' ? 'b-exp' : s.status === 'En transit' ? 'b-transit' : 'b-livre';
    return `<div class="scan-item">
      <div>
        <div class="scan-item-code">${s.code}</div>
        <div class="scan-item-meta">${s.user} · ${s.date} ${s.time} ${s.synced ? '✓' : '⚠'}</div>
      </div>
      <span class="badge ${bc}">${s.status}</span>
    </div>`;
  }).join('');
}

function renderReport() {
  const today = new Date().toLocaleDateString('fr-FR');
  const todayScans = scans.filter(s => s.date === today);
  document.getElementById('r-total').textContent = todayScans.length;
  document.getElementById('r-exp').textContent = todayScans.filter(s => s.status === 'Expédié').length;
  document.getElementById('r-transit').textContent = todayScans.filter(s => s.status === 'En transit').length;
  document.getElementById('r-livre').textContent = todayScans.filter(s => s.status === 'Livré').length;
  const byUser = {};
  todayScans.forEach(s => { byUser[s.user] = (byUser[s.user] || 0) + 1; });
  document.getElementById('r-byuser').innerHTML = Object.entries(byUser)
    .sort((a,b) => b[1]-a[1])
    .map(([u,c]) => `<div class="user-row"><span>${u}</span><span class="user-count">${c}</span></div>`)
    .join('') || '<div class="empty">Aucun scan aujourd\'hui.</div>';
}

function exportCSV() {
  if (!scans.length) { alert('Aucun scan à exporter.'); return; }
  const header = 'Code;Statut;Employé;Date;Heure\n';
  const rows = scans.map(s => `${s.code};${s.status};${s.user};${s.date};${s.time}`).join('\n');
  const blob = new Blob(['\uFEFF' + header + rows], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'scans_transport.csv'; a.click();
  URL.revokeObjectURL(url);
}
</script>
